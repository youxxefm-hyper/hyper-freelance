                </svg> );

        // ──────────────────────────────────────────────
        // HOOK: INTERSECTION OBSERVER FOR SCROLL REVEAL
        // ──────────────────────────────────────────────
        const useScrollReveal = () => {
            const ref = useRef(null);
            const [isVisible, setIsVisible] = useState(false);
            useEffect(() => {
                const node = ref.current;
                if (!node) return;
                const observer = new IntersectionObserver(
                    ([entry]) => {
                        if (entry.isIntersecting) {
                            setIsVisible(true);
                            observer.unobserve(node);
                        }
                    }, { threshold: 0.12, rootMargin: '0px 0px -40px 0px' }
                );
                observer.observe(node);
                return () => observer.unobserve(node);
            }, []);
            return [ref, isVisible];
        };

        // ──────────────────────────────────────────────
        // REUSABLE: Section Reveal Wrapper
        // ──────────────────────────────────────────────
        const RevealSection = ({ children, className = "" }) => {
            const [ref, isVisible] = useScrollReveal();
            return ( <section ref={ref} className={`section-reveal ${isVisible ? "visible" : ""} ${className}`}>

                    {/* Right side */}

                    {darkMode ? <SunIcon /> : <MoonIcon />}

                    Start a Project

                    Join as Freelancer

                    {/* Mobile buttons */}
                    <div className="flex lg:hidden items-center gap-2">
                    <button onClick={toggleDarkMode}
                    className="p-2 rounded-lg dark:text-gray-400 text-gray-500 hover:text-indigo-400"
                    aria-label="Toggle theme">
                    {darkMode ? <SunIcon /> : <MoonIcon />}
                    </button>
                    <button onClick={() => setMobileOpen(!mobileOpen)}

                    {mobileOpen ? <CloseIcon /> : <MenuIcon />}
                    </button>
                    </div>
                </div>
                </div>

                {/* Mobile Menu */}
                <div className={`lg:hidden transition-all duration-300 overflow-hidden ${mobileOpen ? 'max-h-[420px] opacity-100' : 'max-h-0 opacity-0'}`}>
                <div className="mobile-menu px-6 py-5 space-y-3 border-t dark:border-white/5 border-gray-200">
                    {navLinks.map(link => ( <a key={link.label} href={link.href} onClick={() => setMobileOpen(false)}

                    {link.label} </a>
                    ))}

                    Start a Project
                    </a>

                    Join as Freelancer
                    </a>
