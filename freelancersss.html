<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HYPER All Freelancers</title>


    <link rel="icon" href="hyper logo ym17.jpeg" type="image/x-icon">

    <style>


.whatsapp-float {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 65px;
            height: 65px;
            background-color: #25D366;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 6px 20px rgba(37, 211, 102, 0.45);
            transition: all 0.3s ease;
            z-index: 9999;
            text-decoration: none;
            animation: pulse 2s infinite;
        }

        .whatsapp-float:hover {
            background-color: #1ebe57;
            transform: scale(1.1);
            box-shadow: 0 10px 30px rgba(37, 211, 102, 0.6);
        }

        .whatsapp-float:active {
            transform: scale(0.95);
        }

        /* أيقونة الواتساب SVG */
        .whatsapp-float svg {
            width: 36px;
            height: 36px;
            fill: #fff;
            pointer-events: none;
        }

        /* نبضة خفيفة لجذب الانتباه */
        @keyframes pulse {
            0% {
                box-shadow: 0 6px 20px rgba(37, 211, 102, 0.45);
            }
            50% {
                box-shadow: 0 6px 30px rgba(37, 211, 102, 0.75), 0 0 0 12px rgba(37, 211, 102, 0.12);
            }
            100% {
                box-shadow: 0 6px 20px rgba(37, 211, 102, 0.45);
            }
        }

        /* Tooltip صغير يظهر عند التحويم */
        .whatsapp-float::after {
            content: "تحدث معنا على واتساب";
            position: absolute;
            right: 80px;
            background: #333;
            color: #fff;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 13px;
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .whatsapp-float:hover::after {
            opacity: 1;
        }








        :root {
            /* Light Mode (Fallback) */
            --bg-primary: #f0f2f7;
            --bg-secondary: #ffffff;
            --bg-tertiary: #f8f9fd;
            --text-primary: #1e2235;
            --text-secondary: #4a4f63;
            --text-tertiary: #7c81a0;
            --border-color: #e2e5f0;
            --border-light: #eef0f8;
            --card-bg: #ffffff;
            --card-shadow: 0 4px 20px rgba(0, 0, 0, 0.06), 0 1px 4px rgba(0, 0, 0, 0.04);
            --card-shadow-hover: 0 20px 44px rgba(0, 0, 0, 0.12), 0 6px 16px rgba(0, 0, 0, 0.07);
            --overlay-bg: rgba(10, 12, 20, 0.6);
            --modal-bg: #ffffff;
            --skill-bg: #f1f3fa;
            --skill-color: #495378;
            --skill-bg-hover: #e8ecff;
            --skill-color-hover: #3b54d4;
            --tag-bg: #f4f5fb;
            --tag-color: #4a5580;
            --header-gradient: linear-gradient(135deg, #1a1f35 0%, #252b48 40%, #1a1f35 100%);
            --header-text: #ffffff;
            --header-subtitle: rgba(255, 255, 255, 0.8);
            --badge-bg: rgba(255, 255, 255, 0.12);
            --badge-text: #ffffff;
            --star-empty: #d5d9e8;
            --star-filled: #f2a83b;
            --rating-bg: #f9fafc;
            --rating-color: #1e2235;
            --btn-view-shadow: 0 4px 14px rgba(79, 110, 247, 0.3);
            --btn-view-shadow-hover: 0 8px 28px rgba(79, 110, 247, 0.45);
            --modal-close-bg: #f1f3fa;
            --modal-close-color: #555;
            --modal-close-hover-bg: #e2e5f2;
            --modal-bio-bg: #f9fafd;
            --input-bg: #ffffff;
            --input-border: #e2e5f0;
            --input-focus-shadow: rgba(79, 110, 247, 0.1);
            --sort-btn-bg: #ffffff;
            --sort-btn-border: #e2e5f0;
            --sort-btn-hover-bg: #eef1ff;
            --sort-btn-active-bg: #4f6ef7;
            --sort-btn-active-color: #fff;
            --top-rated-border: #f2a83b;
            --top-rated-badge-bg: #fff8ed;
            --top-rated-badge-color: #c47d10;
            --status-dot-color: #22c55e;
            --status-dot-border: #ffffff;
            --primary: #4f6ef7;
            --primary-dark: #3b54d4;
            --primary-light: #eef1ff;
            --gold: #f2a83b;
            --gold-light: #fff8ed;
            --radius: 18px;
            --radius-sm: 10px;
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --font: 'Segoe UI', 'Tajawal', 'IBM Plex Sans Arabic', Tahoma, sans-serif;
            --grid-pattern-opacity: 0.03;
            --glow-effect: none;
        }

        /* Dark Theme (Default) */
        [data-theme="dark"] {
            --bg-primary: #0d0f17;
            --bg-secondary: #151824;
            --bg-tertiary: #1a1d2b;
            --text-primary: #e8eaf0;
            --text-secondary: #a8adc4;
            --text-tertiary: #7a7f9a;
            --border-color: #252a3a;
            --border-light: #1f2333;
            --card-bg: #181b28;
            --card-shadow: 0 4px 24px rgba(0, 0, 0, 0.35), 0 1px 4px rgba(0, 0, 0, 0.25);
            --card-shadow-hover: 0 24px 52px rgba(0, 0, 0, 0.5), 0 8px 20px rgba(79, 110, 247, 0.12);
            --overlay-bg: rgba(0, 0, 0, 0.75);
            --modal-bg: #181b28;
            --skill-bg: #1f2333;
            --skill-color: #a8adc4;
            --skill-bg-hover: #252b40;
            --skill-color-hover: #8b9eff;
            --tag-bg: #1f2333;
            --tag-color: #b0b7d4;
            --header-gradient: linear-gradient(135deg, #090b13 0%, #121624 30%, #0d1020 60%, #090b13 100%);
            --header-text: #f0f1f5;
            --header-subtitle: rgba(255, 255, 255, 0.7);
            --badge-bg: rgba(255, 255, 255, 0.08);
            --badge-text: rgba(255, 255, 255, 0.85);
            --star-empty: #2f3548;
            --star-filled: #f5b642;
            --rating-bg: #1f2333;
            --rating-color: #e8eaf0;
            --btn-view-shadow: 0 4px 18px rgba(79, 110, 247, 0.35);
            --btn-view-shadow-hover: 0 10px 34px rgba(79, 110, 247, 0.55);
            --modal-close-bg: #252a3a;
            --modal-close-color: #b0b5cc;
            --modal-close-hover-bg: #323750;
            --modal-bio-bg: #1a1d2b;
            --input-bg: #181b28;
            --input-border: #252a3a;
            --input-focus-shadow: rgba(79, 110, 247, 0.2);
            --sort-btn-bg: #181b28;
            --sort-btn-border: #252a3a;
            --sort-btn-hover-bg: #252b40;
            --sort-btn-active-bg: #4f6ef7;
            --sort-btn-active-color: #fff;
            --top-rated-border: #f5b642;
            --top-rated-badge-bg: #2a2218;
            --top-rated-badge-color: #f5b642;
            --status-dot-color: #22c55e;
            --status-dot-border: #181b28;
            --grid-pattern-opacity: 0.04;
            --glow-effect: 0 0 80px rgba(79, 110, 247, 0.06);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html {
            scroll-behavior: smooth;
        }
        body {
            font-family: var(--font);
            background-color: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            transition: background-color 0.4s ease, color 0.4s ease;
            position: relative;
            overflow-x: hidden;
        }

        /* Subtle grid pattern overlay */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            opacity: var(--grid-pattern-opacity);
            background-image:
                linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            transition: opacity 0.4s ease;
        }

        /* Ambient glow */
        body::after {
            content: '';
            position: fixed;
            top: -200px;
            left: 50%;
            transform: translateX(-50%);
            width: 700px;
            height: 700px;
            background: radial-gradient(circle, rgba(79, 110, 247, 0.07) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
            border-radius: 50%;
            transition: all 0.4s ease;
        }

        [data-theme="dark"] body::after {
            background: radial-gradient(circle, rgba(79, 110, 247, 0.1) 0%, transparent 70%);
        }

        /* ==================== HEADER ==================== */
        .header {
            background: var(--header-gradient);
            padding: 30px 0 36px;
            text-align: center;
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.3);
            z-index: 1;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.4s ease;
        }

        .header::before {
            content: '';
            position: absolute;
            top: -80px;
            right: -100px;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(79, 110, 247, 0.15) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
        }
        .header::after {
            content: '';
            position: absolute;
            bottom: -90px;
            left: -80px;
            width: 280px;
            height: 280px;
            background: radial-gradient(circle, rgba(139, 92, 246, 0.1) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
        }

        .header-content {
            position: relative;
            z-index: 1;
            max-width: 800px;
            margin: 0 auto;
            padding: 0 20px;
        }
        .header-icon {
            display: inline-block;
            width: 60px;
            height: 60px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            margin-bottom: 14px;
            line-height: 60px;
            font-size: 30px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            transition: all 0.4s ease;
        }
        .header h1 {
            color: var(--header-text);
            font-size: 2.1rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 4px;
            transition: color 0.4s ease;
        }
        .header .subtitle {
            color: var(--header-subtitle);
            font-size: 1rem;
            font-weight: 400;
            transition: color 0.4s ease;
        }
        .header .badge-count {
            display: inline-block;
            background: var(--badge-bg);
            color: var(--badge-text);
            padding: 5px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            margin-top: 10px;
            backdrop-filter: blur(6px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            font-weight: 500;
            transition: all 0.4s ease;
        }

        /* Theme Toggle */
        .theme-toggle-wrapper {
            position: absolute;
            top: 16px;
            left: 20px;
            z-index: 10;
        }
        .theme-toggle {
            width: 46px;
            height: 46px;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.08);
            color: #fff;
            font-size: 1.3rem;
            cursor: pointer;
            transition: all 0.35s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(8px);
            position: relative;
            overflow: hidden;
        }
        .theme-toggle:hover {
            background: rgba(255, 255, 255, 0.18);
            border-color: rgba(255, 255, 255, 0.4);
            transform: rotate(15deg) scale(1.08);
            box-shadow: 0 0 24px rgba(255, 255, 255, 0.15);
        }
        .theme-toggle:active {
            transform: scale(0.92);
            transition: 0.1s;
        }
        .theme-toggle .icon-sun,
        .theme-toggle .icon-moon {
            position: absolute;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        [data-theme="dark"] .theme-toggle .icon-sun {
            opacity: 1;
            transform: rotate(0deg) scale(1);
        }
        [data-theme="dark"] .theme-toggle .icon-moon {
            opacity: 0;
            transform: rotate(90deg) scale(0.5);
        }
        [data-theme="light"] .theme-toggle .icon-sun {
            opacity: 0;
            transform: rotate(-90deg) scale(0.5);
        }
        [data-theme="light"] .theme-toggle .icon-moon {
            opacity: 1;
            transform: rotate(0deg) scale(1);
        }
        [data-theme="light"] .theme-toggle {
            border-color: rgba(0, 0, 0, 0.15);
            background: rgba(0, 0, 0, 0.04);
            color: #333;
        }
        [data-theme="light"] .theme-toggle:hover {
            background: rgba(0, 0, 0, 0.08);
            border-color: rgba(0, 0, 0, 0.3);
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.08);
        }

        /* ==================== MAIN CONTAINER ==================== */
        .container {
            max-width: 1240px;
            margin: 0 auto;
            padding: 30px 20px 44px;
            position: relative;
            z-index: 1;
        }

        /* ==================== TOOLBAR ==================== */
        .toolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 14px;
            margin-bottom: 30px;
        }
        .search-wrapper {
            position: relative;
            flex: 1;
            min-width: 250px;
            max-width: 440px;
        }
        .search-wrapper .search-icon {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.1rem;
            color: var(--text-tertiary);
            pointer-events: none;
            transition: color var(--transition);
        }
        .search-input {
            width: 100%;
            padding: 13px 46px 13px 18px;
            border: 2px solid var(--input-border);
            border-radius: 50px;
            font-size: 0.95rem;
            font-family: var(--font);
            background: var(--input-bg);
            color: var(--text-primary);
            transition: all var(--transition);
            outline: none;
        }
        .search-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 5px var(--input-focus-shadow);
        }
        .search-input:focus~.search-icon,
        .search-wrapper:focus-within .search-icon {
            color: var(--primary);
        }
        .search-input::placeholder {
            color: var(--text-tertiary);
        }
        .sort-btn {
            padding: 13px 24px;
            border: 2px solid var(--sort-btn-border);
            border-radius: 50px;
            font-size: 0.9rem;
            font-family: var(--font);
            background: var(--sort-btn-bg);
            color: var(--text-primary);
            cursor: pointer;
            transition: all var(--transition);
            white-space: nowrap;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 7px;
            user-select: none;
        }
        .sort-btn:hover {
            border-color: var(--primary);
            color: var(--primary);
            background: var(--sort-btn-hover-bg);
        }
        .sort-btn.active {
            background: var(--sort-btn-active-bg);
            color: var(--sort-btn-active-color);
            border-color: var(--sort-btn-active-bg);
        }
        .results-info {
            color: var(--text-secondary);
            font-size: 0.9rem;
            font-weight: 500;
            flex-shrink: 0;
            transition: color 0.4s ease;
        }

        /* ==================== GRID ==================== */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(275px, 1fr));
            gap: 24px;
        }

        /* ==================== CARD ==================== */
        .card {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 28px 22px 24px;
            box-shadow: var(--card-shadow);
            transition: all var(--transition);
            position: relative;
            border: 1px solid var(--border-light);
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            animation: cardFadeIn 0.5s ease forwards;
            opacity: 0;
            cursor: default;
            z-index: 1;
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
        }
        @keyframes cardFadeIn {
            from {
                opacity: 0;
                transform: translateY(22px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .card:hover {
            transform: translateY(-8px);
            box-shadow: var(--card-shadow-hover);
            border-color: rgba(79, 110, 247, 0.3);
            z-index: 2;
        }
        .card:hover .card-avatar {
            transform: scale(1.07);
            box-shadow: 0 8px 28px rgba(79, 110, 247, 0.35);
        }
        .card:hover .card-name {
            color: var(--primary);
        }
       
        .top-rated-badge {
            position: absolute;
            top: 14px;
            left: 14px;
            background: var(--top-rated-badge-bg);
            color: var(--top-rated-badge-color);
            font-size: 0.7rem;
            font-weight: 700;
            padding: 4px 11px;
            border-radius: 20px;
            letter-spacing: 0.2px;
            transition: all 0.4s ease;
        }


        .card-avatar {
            width: 92px;
            height: 92px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.1rem;
            font-weight: 700;
            color: #fff;
            margin-bottom: 18px;
            transition: all var(--transition);
            flex-shrink: 0;
            user-select: none;
            position: relative;
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.2);
            letter-spacing: 1px;
        }
        .card-avatar .status-dot {
            position: absolute;
            bottom: 5px;
            right: 5px;
            width: 17px;
            height: 17px;
            background: var(--status-dot-color);
            border-radius: 50%;
            border: 3px solid var(--status-dot-border);
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.2);
            transition: all 0.4s ease;
        }
        .card-name {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 4px;
            transition: color var(--transition);
            letter-spacing: -0.3px;
        }
        .card-title {
            font-size: 0.84rem;
            color: var(--text-secondary);
            margin-bottom: 12px;
            font-weight: 400;
            transition: color 0.4s ease;
        }
        .stars-container {
            display: flex;
            align-items: center;
            gap: 3px;
            margin-bottom: 14px;
            justify-content: center;
        }
        .star {
            display: inline-block;
            font-size: 1.1rem;
            line-height: 1;
            color: var(--star-empty);
            position: relative;
            transition: color 0.2s;
        }
        .star.filled {
            color: var(--star-filled);
        }
        .star.half {
            position: relative;
            color: var(--star-empty);
        }
        .star.half .star-fill {
            position: absolute;
            top: 0;
            right: 0;
            overflow: hidden;
            width: 52%;
            color: var(--star-filled);
            white-space: nowrap;
        }
        .rating-number {
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--rating-color);
            margin-right: 6px;
            background: var(--rating-bg);
            padding: 3px 9px;
            border-radius: 10px;
            letter-spacing: -0.2px;
            transition: all 0.4s ease;
        }
        .skills-container {
            display: flex;
            flex-wrap: wrap;
            gap: 7px;
            justify-content: center;
            margin-bottom: 18px;
            min-height: 32px;
        }
        .skill-tag {
            display: inline-block;
            padding: 6px 14px;
            font-size: 0.78rem;
            font-weight: 500;
            border-radius: 20px;
            background: var(--skill-bg);
            color: var(--skill-color);
            transition: all 0.25s;
            white-space: nowrap;
            letter-spacing: -0.1px;
        }
        .card:hover .skill-tag {
            background: var(--skill-bg-hover);
            color: var(--skill-color-hover);
        }
        .btn-view {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 30px;
            font-size: 0.9rem;
            font-weight: 600;
            font-family: var(--font);
            color: #fff;
            background: var(--primary);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all var(--transition);
            letter-spacing: -0.1px;
            margin-top: auto;
            box-shadow: var(--btn-view-shadow);
        }
        .btn-view:hover {
            background: var(--primary-dark);
            box-shadow: var(--btn-view-shadow-hover);
            transform: translateY(-3px);
        }
        .btn-view:active {
            transform: scale(0.95);
            transition: 0.1s;
        }

        /* ==================== MODAL ==================== */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: var(--overlay-bg);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.35s ease, visibility 0.35s ease;
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
        }
        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }
        .modal {
            background: var(--modal-bg);
            border-radius: var(--radius);
            padding: 34px 28px 28px;
            max-width: 480px;
            width: 100%;
            position: relative;
            box-shadow: 0 24px 60px rgba(0, 0, 0, 0.4);
            text-align: center;
            transform: translateY(24px) scale(0.95);
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            max-height: 85vh;
            overflow-y: auto;
            border: 1px solid var(--border-light);
        }
        .modal-overlay.active .modal {
            transform: translateY(0) scale(1);
        }
        .modal-close {
            position: absolute;
            top: 14px;
            left: 14px;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: none;
            background: var(--modal-close-bg);
            color: var(--modal-close-color);
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.25s;
            display: flex;
            align-items: center;

                let html = '';
                const fullStars = Math.floor(rating);
                const hasHalf = rating - fullStars >= 0.4;
                const emptyStars = 5 - fullStars - (hasHalf ? 1 : 0);
                for (let i = 0; i < fullStars; i++) html += '<span class="star filled">★</span>';
                if (hasHalf) html += '<span class="star half">☆<span class="star-fill">★</span></span>';
                for (let i = 0; i < emptyStars; i++) html += '<span class="star">☆</span>';
                return html;

            }

            function closeModal() {
                modalOverlay.classList.remove('active');
                document.body.style.overflow = '';
            }

            modalClose.addEventListener('click', closeModal);
            modalOverlay.addEventListener('click', function(e) { if (e.target === modalOverlay) closeModal(); });
            document.addEventListener('keydown', function(e) { if (e.key === 'Escape' && modalOverlay.classList.contains('active')) closeModal(); });

            // Search
            let searchTimeout;
            searchInput.addEventListener('input', function() {
                clearTimeout(searchTimeout);
                searchTimeout = setTimeout(() => { searchQuery = searchInput.value;
                    refreshGrid(); }, 250);
            });

            // Sort
            sortBtn.addEventListener('click', function() {
                if (currentSort === 'rating-desc') {
                    currentSort = 'default';
                    sortBtn.classList.remove('active');
                    sortBtn.innerHTML = 'top rated';
                } else {
                    currentSort = 'rating-desc';
                    sortBtn.classList.add('active');
                    sortBtn.innerHTML = 'default order';
                }
                refreshGrid();
            });

            // ==================== INIT ====================
            refreshGrid();
            updateInfo(freelancers.length);
            console.log('✅ تم تحميل منصة الفريلانسرز | Dark/Light Mode جاهز | الوضع الحالي:', getSavedTheme());
        })();
    </script>
</body>
</html>
